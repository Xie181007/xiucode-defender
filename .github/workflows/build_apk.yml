name: 🚀 Build & Release APK

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  # Bisa juga trigger manual dari tab Actions
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Flutter APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      # ── 1. Checkout kode ──────────────────────────────────────
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # ── 2. Setup Java (dibutuhkan oleh Android build tools) ───
      - name: ☕ Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      # ── 3. Setup Flutter ──────────────────────────────────────
      - name: 🐦 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      # ── 4. Install dependencies ───────────────────────────────
      - name: 📦 Install Dependencies
        run: flutter pub get

      # ── 5. Analyze kode (opsional, skip error agar tetap build)
      - name: 🔍 Analyze Code
        run: flutter analyze --no-fatal-infos || true

      # ── 7. Build APK Release ──────────────────────────────────
      - name: 🔨 Build APK (Release)
        run: flutter build apk --release --split-per-abi

      # ── 8. Build APK Universal (satu APK untuk semua device) ──
      - name: 🔨 Build APK (Universal)
        run: flutter build apk --release

      # ── 9. Upload APK sebagai artifact ────────────────────────
      - name: 📤 Upload APK Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: xiucode-defender-apk
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          retention-days: 30

      # ── 10. Auto Release (hanya jika push tag v*) ─────────────
      - name: 🏷️ Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: "XiuCode Defender ${{ github.ref_name }}"
          body: |
            ## 🎮 XiuCode Defender ${{ github.ref_name }}

            **Cyberpunk Hacking Simulation Game — Time Attack Edition**

            ### 📥 Download APK
            | File | Keterangan |
            |------|-----------|
            | `app-release.apk` | Universal APK (semua device) |
            | `app-arm64-v8a-release.apk` | Android 64-bit (direkomendasikan) |
            | `app-armeabi-v7a-release.apk` | Android 32-bit (device lama) |

            ### 🎯 Cara Install
            1. Download file `.apk` sesuai device kamu
            2. Di HP Android, aktifkan **"Install dari sumber tidak dikenal"**
            3. Install APK dan mainkan!

            ### 📋 Changelog
            - 15 level eksploitasi (Introductory → Advanced)
            - Timer 5 menit per level + penalti -10 detik
            - Maskot XIU dengan 3 ekspresi animasi
            - Matrix rain background
            - Leaderboard lokal
          files: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/flutter-apk/app-arm64-v8a-release.apk
            build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk
            build/app/outputs/flutter-apk/app-x86_64-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
