name: xiucode_defender
description: "XiuCode Defender v0.1 - Time Attack Edition. Cyberpunk hacking simulation game."
publish_to: 'none'

version: 0.1.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  shared_preferences: ^2.5.3
  flutter_animate: ^4.5.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/xiu_normal.png
    - assets/images/xiu_success.png
    - assets/images/xiu_fail.png
